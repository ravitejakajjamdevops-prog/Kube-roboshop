apiVersion: apps/v1
kind: Deployment
metadata: 
  name: mongodb
  labels:
    project: roboshop
    component: mongodb
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels: 
       project: roboshop
       component: mongodb
       environment: dev
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        environment: dev
    spec:
      containers:
        - name: mongodb
          image: raviteja471/mongodb:1.0.0

---
apiVersion: v1  
kind: Service
metadata: 
  name: mongodb-service 
  labels:
       project: roboshop
       component: mongodb
       environment: dev
spec:
  selector:
     project: roboshop
     component: mongodb
     environment: dev

  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017 